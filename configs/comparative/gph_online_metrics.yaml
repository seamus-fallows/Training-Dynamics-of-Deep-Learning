experiment:
  name: gph_online_comparative_metrics

shared:
  model:
    in_dim: 5
    out_dim: 5
    num_hidden: 3
    hidden_dim: 100
    gamma: 1.0
    model_seed: 0
  training:
    lr: 0.0001
    optimizer: SGD
    optimizer_params: null
    criterion: MSELoss
    batch_seed: 0
    track_train_loss: false

model_a: {}
model_b: {}

# A = large batch (B=500), B = mini-batch
training_a:
  batch_size: 500
training_b:
  batch_size: 10

data:
  train_samples: 500
  test_samples: 500
  data_seed: 0
  online: true
  noise_std: 0.0
  params:
    matrix: power_law
    scale: 50
    alpha: 1.0

max_steps: 10000
num_evaluations: 250

# Both models are stochastic in online mode, so track metrics for both.
metrics:
  - layer_norms
  - gram_norms
  - balance_diffs
  - end_to_end_weight_norm

comparative_metrics:
  - param_distance
  - layer_distances
  - frobenius_distance

callbacks_a: []
callbacks_b: []
